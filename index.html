<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Dashboard - API Lab</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .card { transition: transform 0.2s; }
        .card:hover { transform: translateY(-5px); }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container">
            <span class="navbar-brand mb-0 h1">Posts Explorer</span>
        </div>
    </nav>

    <div class="container">
        <div class="row g-3 mb-4 align-items-end">
            <div class="col-md-4">
                <label for="userSelect" class="form-label fw-bold">Select User</label>
                <select id="userSelect" class="form-select">
                    <option value="">Loading users...</option>
                </select>
            </div>
            <div class="col-md-4">
                <label for="searchInput" class="form-label fw-bold">Search Posts</label>
                <input type="text" id="searchInput" class="form-control" placeholder="Search by title...">
            </div>
            <div class="col-md-4">
                <button id="reloadBtn" class="btn btn-primary w-100">Reload All Data</button>
            </div>
        </div>

        <div id="loader" class="text-center d-none my-5">
            <div class="spinner-border text-primary" style="width: 3rem; height: 3rem;" role="status"></div>
            <p class="mt-2 text-primary fw-bold">Fetching Data...</p>
        </div>

        <div id="alertContainer" class="mb-4"></div>

        <div id="postsGrid" class="row g-4"></div>

        <div id="pagination" class="py-4"></div>
    </div>

    <script type="module" src="app/main.js"></script>
</body>
</html>
