<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Dashboard - Promises & Modules</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container justify-content-center">
            <span class="navbar-brand mb-0 h1 ">User Posts Dashboard</span>
        </div>
    </nav>

    <div class="container">
        <div class="row g-3 mb-4 align-items-end">
            <div class="col-md-4">
                <label class="form-label">Select User</label>
                <select id="userSelect" class="form-select">
                    <option value="">Choose a user...</option>
                </select>
            </div>
            <div class="col-md-4">
                <label class="form-label">Search Posts</label>
                <input type="text" id="searchInput" class="form-control" placeholder="Search by title...">
            </div>
            <div class="col-md-4">
                <button id="reloadBtn" class="btn btn-primary w-100">Reload Data</button>
            </div>
        </div>

        <div id="loader" class="text-center d-none my-5">
            <div class="spinner-border text-primary" role="status"></div>
            <p>Loading data...</p>
        </div>

        <div id="alertContainer"></div>

        <div id="postsGrid" class="row g-4">
            </div>
    </div>

    <script type="module" src="app/main.js"></script>
</body>
</html>
